name: Publish

# The build jobs run on every PR and push to main as a dry run of the real
# release pipeline — same targets, same interpreters — so a publish-time
# breakage (unsupported interpreter, packaging error, bad metadata) surfaces
# in CI before a tag is cut. Only the upload jobs are gated on v* tags.
on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    name: Build wheel (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  build-freethreaded:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    name: Build free-threaded wheel (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: matrix.os != 'ubuntu-latest'
        with:
          python-version: 3.14t

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter python3.14t
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-freethreaded-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    name: Build sdist

    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  check-dist:
    runs-on: ubuntu-latest
    name: twine check
    needs: [build-wheels, build-freethreaded, sdist]

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: astral-sh/setup-uv@v5

      - run: uv tool run twine check --strict dist/*

  crates-dry-run:
    runs-on: ubuntu-latest
    name: cargo publish --dry-run
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: publish-dry-run

      - run: cargo publish --dry-run

  publish-pypi:
    runs-on: ubuntu-latest
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check-dist]

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: astral-sh/setup-uv@v5

      - name: Publish to PyPI
        run: uv publish dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  publish-crates:
    runs-on: ubuntu-latest
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
